<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="安全跑者金句卡片">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .zh { font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC","Hiragino Sans GB",sans-serif; }
      .mono { font-family: "SFMono-Regular","Consolas","Menlo",monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="14" height="630" fill="#38bdf8"/>

  <text x="90" y="120" class="zh" fill="#38bdf8" font-size="28" font-weight="700" letter-spacing="6">BODY TERRITORY · 安全跑者</text>
  <line x1="92" y1="146" x2="320" y2="146" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>

  <text x="90" y="300" class="zh" fill="#f8fafc" font-size="58" font-weight="800">网络安全是我要成为谁，</text>
  <text x="90" y="386" class="zh" fill="#f8fafc" font-size="58" font-weight="800">跑步是我用什么身体去成为那个人。</text>

  <text x="90" y="486" class="zh" fill="#cbd5e1" font-size="32" font-weight="600">—— 一个用身体的纪律映照安全的纪律的人</text>

  <text x="90" y="566" class="mono" fill="#64748b" font-size="24">github.com/Landjun/body-territory</text>
</svg>
