name: Regenerate Quote Cards

# 当金句生成器变化时，自动重新生成卡片并提交回仓库
on:
  push:
    branches: [main]
    paths:
      - scripts/gen_quote_cards.py
      - .github/workflows/quote-cards.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate cards
        run: python scripts/gen_quote_cards.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain docs/08-safe-runner-brand/cards)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/08-safe-runner-brand/cards
            git commit -m "chore: regenerate quote cards [skip ci]"
            git push
          else
            echo "No card changes."
          fi
